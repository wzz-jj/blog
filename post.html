<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 — 我的博客</title>
  <meta name="description" content="阅读博客文章，参与评论讨论。">
  <meta property="og:title" content="文章 — 我的博客">
  <meta property="og:description" content="阅读博客文章，参与评论讨论。">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://YOUR_USERNAME.github.io/blog/post.html">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="highlightTheme">
</head>
<body>
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="index.html" class="logo">🏠 我的博客</a>
      <div class="nav-links">
        <a href="index.html">首页</a>
        <a href="about.html">关于</a>
        <button id="themeToggle" class="theme-btn" title="切换主题">🌙</button>
      </div>
      <button class="menu-btn" id="menuBtn">☰</button>
    </div>
    <div class="mobile-nav" id="mobileNav">
      <a href="index.html">首页</a>
      <a href="about.html">关于</a>
    </div>
  </nav>

  <main class="container post-container">
    <a href="index.html" class="back-link">← 返回首页</a>
    <article class="post-detail" id="postDetail">
      <div class="loading">加载中...</div>
    </article>

    <section class="comments-section" id="commentsSection">
      <h2>💬 评论 (<span id="commentCount">0</span>)</h2>
      <form class="comment-form" id="commentForm">
        <input type="text" id="commentName" placeholder="你的昵称" required maxlength="20">
        <textarea id="commentContent" placeholder="写下你的想法..." required rows="3"></textarea>
        <button type="submit">发表评论</button>
      </form>
      <div class="comment-list" id="commentList"></div>
    </section>
  </main>

  <button class="back-to-top" id="backToTop" title="返回顶部">↑</button>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 我的博客 · Powered by ❤️</p>
    </div>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
  <script src="js/post.js"></script>
</body>
</html>
